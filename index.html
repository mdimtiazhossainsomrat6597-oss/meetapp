<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Facebook Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@600;700;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg:      rgba(255,255,255,0.10);
      --glass-border:  rgba(255,255,255,0.30);
      --glass-shine:   rgba(255,255,255,0.55);
      --glass-shadow:  rgba(0,0,0,0.35);
      --blur:          28px;
      --fb:            #1877f2;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow-x:hidden; }

    /* ── VIVID BACKGROUND ── */
    body {
      font-family:'Hind Siliguri',sans-serif;
      min-height:100vh;
      display:flex; flex-direction:column;
      background: #0b0e1a;
      position:relative;
    }

    /* colour blobs that make glass look stunning */
    .blobs {
      position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
    }
    .blob {
      position:absolute; border-radius:50%;
      filter:blur(80px); mix-blend-mode:screen;
      animation:blobMove ease-in-out infinite alternate;
    }
    .b1{width:420px;height:420px;background:radial-gradient(circle,#5b21b6,transparent 70%);top:-100px;left:-120px;animation-duration:12s;animation-delay:0s}
    .b2{width:380px;height:380px;background:radial-gradient(circle,#1d4ed8,transparent 70%);bottom:-80px;right:-100px;animation-duration:10s;animation-delay:2s}
    .b3{width:280px;height:280px;background:radial-gradient(circle,#db2777,transparent 70%);top:35%;left:55%;animation-duration:14s;animation-delay:5s}
    .b4{width:220px;height:220px;background:radial-gradient(circle,#0891b2,transparent 70%);bottom:20%;left:5%;animation-duration:11s;animation-delay:3s}
    .b5{width:180px;height:180px;background:radial-gradient(circle,#d97706,transparent 70%);top:15%;right:10%;animation-duration:9s;animation-delay:7s}
    @keyframes blobMove{
      from{transform:translate(0,0) scale(1)}
      to  {transform:translate(30px,40px) scale(1.15)}
    }

    /* noise grain overlay */
    body::after {
      content:'';
      position:fixed; inset:0; z-index:1; pointer-events:none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:0.5;
    }

    /* ── LIQUID GLASS MIXIN ── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(200%) brightness(1.1);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(200%) brightness(1.1);
      border: 1px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 var(--glass-shine),
        inset 0 -1px 0 rgba(0,0,0,0.15),
        0 20px 60px var(--glass-shadow),
        0 0 0 .5px rgba(255,255,255,0.08);
    }

    /* ── BANNER ── */
    .banner {
      position:relative; z-index:20;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 20px rgba(0,0,0,0.2);
      padding:13px 18px;
      display:flex; align-items:center; justify-content:center; gap:9px;
      font-size:14.5px; font-weight:600; color:#fff; line-height:1.6;
    }
    .banner-badge {
      background: linear-gradient(135deg,rgba(99,102,241,.9),rgba(168,85,247,.9));
      border-radius:20px; padding:2px 12px;
      font-weight:800; font-size:14px;
      border:1px solid rgba(255,255,255,0.3);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 4px 12px rgba(99,102,241,0.4);
    }
    .bico{animation:wiggle 2.2s infinite;display:inline-block}
    @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}

    /* ── PAGE ── */
    .page {
      position:relative; z-index:10;
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:36px 22px; gap:26px;
    }

    /* ── AVATAR ── */
    .avatar-wrap { position:relative; }
    .avatar-glow {
      position:absolute; inset:-18px; border-radius:50%;
      background: conic-gradient(#6366f1,#8b5cf6,#ec4899,#3b82f6,#6366f1);
      filter:blur(22px); opacity:.5;
      animation:spin 7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .avatar-ring {
      position:relative;
      width:112px; height:112px; border-radius:50%;
      padding:2.5px;
      background: conic-gradient(#6366f1,#a78bfa,#ec4899,#60a5fa,#6366f1);
    }
    .avatar-inner {
      width:100%; height:100%; border-radius:50%;
      background:#1877f2;
      border:3px solid rgba(255,255,255,0.12);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
      /* liquid glass on avatar border */
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), 0 8px 32px rgba(24,119,242,0.5);
    }
    .avatar-inner svg{width:66px;height:66px}

    /* ── TEXT ── */
    .name {
      font-family:'Baloo Da 2',cursive;
      font-size:23px; font-weight:800; color:#fff;
      text-align:center;
      text-shadow:0 0 30px rgba(139,92,246,0.8);
    }
    .sub{font-size:12.5px;color:rgba(255,255,255,0.35);letter-spacing:.7px;text-align:center;margin-top:3px}

    .divider{width:70px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent)}

    /* ── MAIN CARD ── */
    .card-wrap { width:100%; max-width:370px; position:relative; }

    /* liquid refraction border */
    .card-wrap::before {
      content:'';
      position:absolute; inset:-1.5px; border-radius:30px; z-index:0;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.1) 30%,
        rgba(255,255,255,0.05) 60%,
        rgba(255,255,255,0.3) 100%);
      animation:borderShimmer 5s linear infinite;
    }
    @keyframes borderShimmer{
      0%  {background-position:0% 50%}
      50% {background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .card {
      position:relative; z-index:1;
      border-radius:28px; overflow:hidden;
      /* LIQUID GLASS */
      background: linear-gradient(160deg,
        rgba(255,255,255,0.16) 0%,
        rgba(255,255,255,0.07) 40%,
        rgba(255,255,255,0.04) 100%);
      backdrop-filter: blur(40px) saturate(220%) brightness(1.15);
      -webkit-backdrop-filter: blur(40px) saturate(220%) brightness(1.15);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.45),
        inset 0 -1px 0 rgba(0,0,0,0.2),
        inset 1px 0 0 rgba(255,255,255,0.2),
        inset -1px 0 0 rgba(255,255,255,0.1),
        0 30px 80px rgba(0,0,0,0.45),
        0 0 60px rgba(99,102,241,0.15);
    }

    /* inner top shine */
    .card::before {
      content:'';
      position:absolute; top:0; left:0; right:0; height:50%;
      background: linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 100%);
      pointer-events:none; z-index:2;
      border-radius:28px 28px 0 0;
    }

    /* ── CARD HEADER ── */
    .card-header {
      padding:20px 22px 16px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:relative;
      background:linear-gradient(180deg,rgba(255,255,255,0.05) 0%,transparent 100%);
    }

    .arrow-emoji {
      font-size:30px; display:block; margin-bottom:8px;
      filter:drop-shadow(0 0 12px rgba(251,191,36,.9));
      animation:arrowBounce .65s ease-in-out infinite alternate;
    }
    @keyframes arrowBounce{from{transform:translateY(-6px)}to{transform:translateY(8px)}}

    .header-text {
      font-family:'Baloo Da 2',cursive;
      font-size:17px; font-weight:800;
      background:linear-gradient(135deg,#e0e7ff,#c4b5fd,#fbcfe8);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    /* ── CARD BUTTON ── */
    .card-btn {
      display:flex; align-items:center; gap:14px;
      padding:20px 22px;
      text-decoration:none;
      position:relative; overflow:hidden;
      /* deeper glass layer inside */
      background: linear-gradient(135deg,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.01) 100%);
      transition:all .2s;
    }

    .card-btn:active{
      background:rgba(255,255,255,0.12);
      transform:scale(.98);
    }

    /* liquid shimmer sweep */
    .card-btn::after {
      content:'';
      position:absolute; top:0; left:-100%;
      width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.09),transparent);
      transform:skewX(-20deg);
      animation:liquidSweep 4s ease-in-out infinite;
    }
    @keyframes liquidSweep{0%{left:-100%}60%,100%{left:150%}}

    /* FB logo circle – glass style */
    .fb-circle {
      width:50px; height:50px; border-radius:50%; flex-shrink:0;
      background: linear-gradient(135deg,rgba(24,119,242,0.9),rgba(10,79,181,0.9));
      display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(255,255,255,0.3);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        0 0 20px rgba(24,119,242,0.55),
        0 6px 18px rgba(0,0,0,0.3);
      animation:logoPulse 2.5s ease-in-out infinite alternate;
    }
    @keyframes logoPulse{
      from{box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 0 16px rgba(24,119,242,.45)}
      to  {box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 0 30px rgba(124,58,237,.65)}
    }
    .fb-circle svg{width:30px;height:30px}

    .btn-labels{display:flex;flex-direction:column;gap:3px;flex:1}
    .btn-main{
      font-family:'Baloo Da 2',cursive;
      font-size:19px; font-weight:800;
      color:#fff;
      text-shadow:0 1px 8px rgba(0,0,0,0.4);
    }
    .btn-hint{font-size:12px;color:rgba(255,255,255,0.38);letter-spacing:.3px}

    .chevron{
      font-size:20px; color:rgba(255,255,255,0.45);
      animation:nudge 1.3s ease-in-out infinite alternate;
    }
    @keyframes nudge{from{transform:translateX(0)}to{transform:translateX(5px)}}

    /* ── FLOATING STARS ── */
    .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
    .star{
      position:absolute; border-radius:50%;
      background:white;
      animation:twinkle linear infinite alternate;
    }
    @keyframes twinkle{from{opacity:.04;transform:scale(.7)}to{opacity:.55;transform:scale(1.4)}}
    /* ── WARNING BAR ── */
    .warning-bar {
      position:relative; z-index:20;
      background: linear-gradient(135deg,rgba(239,68,68,0.18),rgba(251,191,36,0.14));
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-bottom: 1px solid rgba(239,68,68,0.35);
      box-shadow:
        inset 0 1px 0 rgba(251,191,36,0.25),
        0 4px 20px rgba(239,68,68,0.2);
      padding:11px 16px;
      display:flex; align-items:center; justify-content:center; gap:8px;
      font-size:13.5px; font-weight:600; color:#fff; line-height:1.5;
      animation:warnPulse 2s ease-in-out infinite;
    }
    @keyframes warnPulse{
      0%,100%{background:linear-gradient(135deg,rgba(239,68,68,0.18),rgba(251,191,36,0.14))}
      50%    {background:linear-gradient(135deg,rgba(239,68,68,0.28),rgba(251,191,36,0.22))}
    }
    .warn-icon{font-size:16px;animation:warnShake .5s ease-in-out infinite alternate}
    @keyframes warnShake{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
    .warn-bold{
      background:linear-gradient(135deg,#fbbf24,#f87171);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; font-weight:800; font-size:14px;
    }
  </style>
</head>
<body>

<!-- Missile canvas -->
<canvas id="missileCanvas" style="position:fixed;inset:0;z-index:2;pointer-events:none;width:100%;height:100%"></canvas>

<!-- Blobs -->
<div class="blobs">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
</div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- BANNER -->
<div class="banner">
  <span class="bico">💬</span>
  <span>দেখা হলে imo তে ম্যাসেজ করো &nbsp;<span class="banner-badge">"complete"</span>&nbsp; লিখে</span>
  <span class="bico">✅</span>
</div>

<!-- WARNING BAR -->
<div class="warning-bar">
  <span class="warn-icon">⚠️</span>
  <span class="warn-text">সতর্কতা! &nbsp;<span class="warn-bold">"Complete"</span>&nbsp; লিখে ম্যাসেজ অবশ্যই করবে</span>
  <span class="warn-icon">⚠️</span>
</div>

<!-- PAGE -->
<div class="page">

  <!-- Avatar -->
  <div class="avatar-wrap">
    <div class="avatar-glow"></div>
    <div class="avatar-ring">
      <div class="avatar-inner">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216 216" fill="white">
          <path d="M204.1 0H11.9C5.3 0 0 5.3 0 11.9v192.2c0 6.6 5.3 11.9 11.9 11.9h103.5v-83.6H87.2V100h28.2V75.8c0-28 17.1-43.2 42-43.2 11.9 0 24.4 .9 27.4 1.3v31.8h-18.8c-14.8 0-17.6 7-17.6 17.3V100h35.2l-4.6 32.4h-30.6V216h60c6.6 0 11.9-5.3 11.9-11.9V11.9C216 5.3 210.7 0 204.1 0z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Name -->
  <div>
    <div class="name">আমার Facebook Profile</div>
    <div class="sub">facebook.com · profile</div>
  </div>

  <div class="divider"></div>

  <!-- Glass Card -->
  <div class="card-wrap">
    <div class="card">

      <div class="card-header">
        <span class="arrow-emoji">👇</span>
        <div class="header-text">বিসমিল্লাহ বলে এখানে ক্লিক করো</div>
      </div>

      <a class="card-btn" href="https://www.facebook.com/profile.php?id=61550293801682" target="_blank" rel="noopener">
        <div class="fb-circle">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216 216" fill="white">
            <path d="M204.1 0H11.9C5.3 0 0 5.3 0 11.9v192.2c0 6.6 5.3 11.9 11.9 11.9h103.5v-83.6H87.2V100h28.2V75.8c0-28 17.1-43.2 42-43.2 11.9 0 24.4 .9 27.4 1.3v31.8h-18.8c-14.8 0-17.6 7-17.6 17.3V100h35.2l-4.6 32.4h-30.6V216h60c6.6 0 11.9-5.3 11.9-11.9V11.9C216 5.3 210.7 0 204.1 0z"/>
          </svg>
        </div>
        <div class="btn-labels">
          <span class="btn-main">Facebook Profile দেখুন</span>
          <span class="btn-hint">ট্যাপ করলেই খুলবে ✨</span>
        </div>
        <span class="chevron">›</span>
      </a>

    </div>
  </div>

</div>

<script>
  // ── Stars ──
  var s = document.getElementById('stars');
  for(var i=0;i<70;i++){
    var el=document.createElement('div');
    el.className='star';
    var sz=.8+Math.random()*2.2;
    el.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-duration:'+(1.5+Math.random()*4)+'s;animation-delay:'+(Math.random()*6)+'s';
    s.appendChild(el);
  }

  // ── Missile Launch ──
  var canvas = document.getElementById('missileCanvas');
  var ctx = canvas.getContext('2d');

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var missiles = [];
  var particles = [];

  function Missile(){
    this.x  = Math.random() * canvas.width;
    this.y  = canvas.height + 20;
    this.tx = this.x + (Math.random()-0.5)*160; // slight drift
    this.vy = -(4 + Math.random()*4);
    this.vx = (this.tx - this.x) / (canvas.height / Math.abs(this.vy));
    this.len  = 22 + Math.random()*14;
    this.w    = 4 + Math.random()*3;
    this.trail= [];
    this.done = false;
    this.hue  = Math.random()<0.5 ? 200+Math.random()*40 : 30+Math.random()*20; // blue or orange
  }

  Missile.prototype.update = function(){
    this.trail.unshift({x:this.x, y:this.y});
    if(this.trail.length > 28) this.trail.pop();
    this.x += this.vx;
    this.y += this.vy;
    // spawn exhaust particles
    for(var i=0;i<3;i++){
      particles.push({
        x: this.x + (Math.random()-.5)*6,
        y: this.y + this.len,
        vx:(Math.random()-.5)*1.8,
        vy: 1.5+Math.random()*2.5,
        life:1, decay:0.03+Math.random()*0.03,
        r: 3+Math.random()*5,
        hue: this.hue,
        type:'exhaust'
      });
    }
    if(this.y < -60) this.explode();
  };

  Missile.prototype.explode = function(){
    this.done = true;
    for(var i=0;i<60;i++){
      var a=Math.random()*Math.PI*2;
      var sp=1.5+Math.random()*4;
      particles.push({
        x:this.x, y:this.y,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
        life:1, decay:0.016+Math.random()*0.02,
        r:2+Math.random()*4,
        hue: 340+Math.random()*30, type:'explosion'
      });
    }
  };

  Missile.prototype.draw = function(){
    var t = this.trail;

    // trail
    for(var i=0;i<t.length-1;i++){
      var alpha=(1-(i/t.length))*0.45;
      var w2=(1-(i/t.length))*5;
      ctx.beginPath();
      ctx.moveTo(t[i].x,t[i].y);
      ctx.lineTo(t[i+1].x,t[i+1].y);
      ctx.strokeStyle='rgba(255,100,150,'+alpha+')';
      ctx.lineWidth=w2;
      ctx.lineCap='round';
      ctx.stroke();
    }

    // exhaust glow
    var grad = ctx.createRadialGradient(this.x, this.y+10, 0, this.x, this.y+10, 20);
    grad.addColorStop(0,'rgba(255,80,120,0.8)');
    grad.addColorStop(0.5,'rgba(255,40,80,0.3)');
    grad.addColorStop(1,'rgba(255,0,60,0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y+10, 16, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // heart emoji
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.font = (22 + this.w*1.5) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('❤️', 0, 0);
    ctx.restore();
  };

  function spawnMissile(){
    missiles.push(new Missile());
    setTimeout(spawnMissile, 600+Math.random()*1200);
  }
  spawnMissile();

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // update & draw missiles
    for(var i=missiles.length-1;i>=0;i--){
      missiles[i].update();
      missiles[i].draw();
      if(missiles[i].done) missiles.splice(i,1);
    }

    // update & draw particles
    for(var j=particles.length-1;j>=0;j--){
      var p=particles[j];
      p.x+=p.vx; p.y+=p.vy;
      if(p.type==='exhaust') p.vy+=0.06;
      p.life-=p.decay;
      if(p.life<=0){ particles.splice(j,1); continue; }
      var a=p.life*0.85;
      if(p.type==='explosion'){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
        ctx.fillStyle='hsla('+p.hue+',100%,65%,'+a+')';
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r*0.6,0,Math.PI*2);
        ctx.fillStyle='rgba(255,160,40,'+a*0.7+')';
        ctx.fill();
      }
    }

    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
